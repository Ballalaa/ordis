<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8" />
<script src="theme.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>შესვლა — Ordis</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-login-body">
<header class="site-header">
  <div class="container header-row">
    <a href="/home" class="logo"><span class="logo-mark">O</span>Ordis</a>
    <div class="header-right">
      <a class="btn btn-outline" href="/home">← მთავარზე დაბრუნება</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="ღია/მუქი რეჟიმის გადართვა" aria-pressed="false">
        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2.5v2.25M12 19.25v2.25M4.22 4.22l1.59 1.59M18.19 18.19l1.59 1.59M2.5 12h2.25M19.25 12h2.25M4.22 19.78l1.59-1.59M18.19 5.81l1.59-1.59" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
        <span class="icon-moon" hidden><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20.5 14.5c-1.1.35-2.28.5-3.5.5-6.35 0-11.5-5.15-11.5-11.5 0-1.22.15-2.4.5-3.5A10.5 10.5 0 0 0 3 11.5C3 17.85 8.15 23 14.5 23A10.5 10.5 0 0 0 20.5 14.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>
      </button>
    </div>
  </div>
</header>
<div class="login-shell">
  <div class="login-card">
    <h1>შესვლა</h1>
    <p class="login-sub">შედი შენს ანგარიშში — მომხმარებლის ან ადმინისტრატორის სახით.</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">მომხმარებელი ან ელ. ფოსტა</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="password">პაროლი</label>
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </div>
      <p class="form-status" id="login-status" role="status" aria-live="polite"></p>
      <button type="submit" class="btn btn-primary btn-block" id="login-submit">შესვლა</button>
    </form>
  </div>
</div>
<script src="admin.js" data-page="login"></script>
</body>
</html>
